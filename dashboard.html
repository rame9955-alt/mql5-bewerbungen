<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Freelance-Bewerbungen · Übersicht</title>
<style>
  :root{
    --bg:#f5f5f7; --card:#ffffff; --ink:#1d1d1f; --muted:#6e6e73;
    --line:#e5e5ea; --accent:#0071e3; --accent-soft:#e8f1fe;
    --green:#1a8d4c; --green-bg:#e6f6ec; --orange:#b25e00; --orange-bg:#fff1de;
    --red:#c0392b; --red-bg:#fdecea; --blue:#0071e3; --blue-bg:#e8f1fe;
    --grey:#6e6e73; --grey-bg:#ececf0;
    --shadow:0 1px 3px rgba(0,0,0,.06),0 8px 24px rgba(0,0,0,.05);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.5;padding:32px 24px 64px}
  .wrap{max-width:1100px;margin:0 auto}
  header{display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:28px}
  h1{font-size:28px;font-weight:600;letter-spacing:-.02em}
  .sub{color:var(--muted);font-size:14px}
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:16px;margin-bottom:28px}
  .stat{background:var(--card);border-radius:18px;padding:20px 22px;box-shadow:var(--shadow)}
  .stat .label{font-size:13px;color:var(--muted);font-weight:500}
  .stat .value{font-size:32px;font-weight:700;letter-spacing:-.02em;margin-top:6px}
  .stat .value small{font-size:16px;font-weight:600;color:var(--muted)}
  .toolbar{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:18px}
  input[type=search],select{font:inherit;padding:10px 14px;border:1px solid var(--line);border-radius:12px;
    background:var(--card);color:var(--ink);outline:none;transition:border-color .15s}
  input[type=search]{flex:1;min-width:220px}
  input[type=search]:focus,select:focus{border-color:var(--accent)}
  .panel{background:var(--card);border-radius:18px;box-shadow:var(--shadow);overflow:hidden}
  table{width:100%;border-collapse:collapse;font-size:14px}
  th,td{padding:14px 16px;text-align:left;border-bottom:1px solid var(--line);vertical-align:middle}
  th{font-size:12px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);font-weight:600;
    background:#fafafa;position:sticky;top:0;cursor:pointer;user-select:none}
  th:hover{color:var(--ink);background:#f2f2f5}
  th .arr{margin-left:6px;font-size:10px;color:var(--ink)}
  th.sorted{color:var(--ink);background:#eef0f4}
  tr:last-child td{border-bottom:none}
  tr:hover td{background:#fafbff}
  tr.dead td{opacity:.55}
  tr.dead td.job a{text-decoration:line-through}
  td.job a{color:var(--ink);text-decoration:none;font-weight:500}
  td.job a:hover{color:var(--accent);text-decoration:underline}
  td.cat{color:var(--muted);font-size:12.5px}
  .price{font-variant-numeric:tabular-nums;font-weight:600}
  .badge{display:inline-block;padding:4px 11px;border-radius:999px;font-size:12px;font-weight:600;white-space:nowrap}
  .b-offen{background:var(--blue-bg);color:var(--blue)}
  .b-geantwortet{background:var(--orange-bg);color:var(--orange)}
  .b-zuschlag{background:var(--green-bg);color:var(--green)}
  .b-abgelehnt{background:var(--red-bg);color:var(--red)}
  .b-vergeben{background:var(--grey-bg);color:var(--grey)}
  .b-geloescht{background:var(--red-bg);color:var(--red)}
  .pill{display:inline-block;padding:3px 9px;border-radius:8px;background:var(--accent-soft);color:var(--accent);font-size:12px;font-weight:600}
  .empty{padding:40px;text-align:center;color:var(--muted)}
  footer{margin-top:22px;color:var(--muted);font-size:12.5px;text-align:center}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1>Freelance-Bewerbungen</h1>
      <div class="sub" id="sub">—</div>
    </div>
    <div class="sub">Ziel: 10 Bewerbungen / Tag</div>
  </header>

  <section class="stats" id="stats"></section>

  <div class="toolbar">
    <input type="search" id="q" placeholder="Suche nach Job, Plattform, Kategorie …">
    <select id="fStatus">
      <option value="">Alle Status</option>
      <option value="offen">Offen</option>
      <option value="geantwortet">Kunde geantwortet</option>
      <option value="zuschlag">Zuschlag</option>
      <option value="vergeben">Vergeben</option>
      <option value="geloescht">Gelöscht</option>
    </select>
    <select id="fPlatform"><option value="">Alle Plattformen</option></select>
  </div>

  <div class="panel">
    <table>
      <thead>
        <tr>
          <th data-k="date" title="Klicken zum Sortieren">Datum<span class="arr"></span></th>
          <th data-k="platform" title="Klicken zum Sortieren">Plattform<span class="arr"></span></th>
          <th data-k="title" title="Klicken zum Sortieren">Job<span class="arr"></span></th>
          <th data-k="priceUsd" title="Klicken zum Sortieren">Preis<span class="arr"></span></th>
          <th data-k="deadlineDays" title="Klicken zum Sortieren">Frist<span class="arr"></span></th>
          <th data-k="status" title="Klicken zum Sortieren">Status<span class="arr"></span></th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
    <div class="empty" id="empty" style="display:none">Keine Bewerbungen gefunden.</div>
  </div>

  <footer id="foot"></footer>
</div>

    { "date":"2026-06-19","time":"20:02","platform":"MQL5","jobId":"249884","title":"MT5 Python Trading Bot – Smart Money Concepts","url":"https://www.mql5.com/en/job/249884/discussion?id=1316483","priceUsd":50,"deadlineDays":4,"status":"offen","category":"Python / EA" },
    { "date":"2026-06-19","time":"20:17","platform":"MQL5","jobId":"249999","title":"Repair TradingView→Python→MT5 system (EXU) + proof report","url":"https://www.mql5.com/en/job/249999/discussion?id=1316485","priceUsd":150,"deadlineDays":7,"status":"offen","category":"Python / Backend" }

// =================================================================

const STATUS_LABEL = {offen:"Offen", geantwortet:"Kunde geantwortet", zuschlag:"Zuschlag", vergeben:"Vergeben", geloescht:"Gelöscht", abgelehnt:"Abgelehnt"};
const ACTIVE = ["offen","geantwortet","zuschlag"]; // zaehlt fuer aktiven Angebotswert
// Status-Sortierung nach Nutzen (oben = wertvollster Lead), NICHT alphabetisch
const STATUS_RANK = {zuschlag:0, geantwortet:1, offen:2, vergeben:3, abgelehnt:4, geloescht:5};
let apps = DATA.applications.slice();
let sortKey = "date", sortDir = -1;

function renderStats(){
  const total = apps.length;
  const offen = apps.filter(a=>a.status==="offen").length;
  const geantw = apps.filter(a=>a.status==="geantwortet").length;
  const tot = apps.filter(a=>a.status==="geloescht"||a.status==="vergeben").length;
  const wert = apps.filter(a=>ACTIVE.includes(a.status)).reduce((s,a)=>s+(+a.priceUsd||0),0);
  const cards = [
    {label:"Bewerbungen gesamt", value:total},
    {label:"Offen / wartet", value:offen},
    {label:"Kunde geantwortet", value:geantw},
    {label:"Gelöscht / vergeben", value:tot},
    {label:"Aktiver Angebotswert", value:wert+' <small>USD</small>'}
  ];
  document.getElementById("stats").innerHTML = cards.map(c=>
    '<div class="stat"><div class="label">'+c.label+'</div><div class="value">'+c.value+'</div></div>').join("");
  document.getElementById("sub").textContent =
    "Letzter Lauf: "+DATA.updated+" · "+total+" Einträge · Status zuletzt geprüft: "+(DATA.statusChecked||"—");
}

function platforms(){ return [...new Set(apps.map(a=>a.platform))].sort(); }

function applyFilters(){
  const q = document.getElementById("q").value.toLowerCase().trim();
  const st = document.getElementById("fStatus").value;
  const pf = document.getElementById("fPlatform").value;
  let list = apps.filter(a=>{
    const hay = (a.title+" "+a.platform+" "+(a.category||"")).toLowerCase();
    return (!q || hay.includes(q)) && (!st || a.status===st) && (!pf || a.platform===pf);
  });
  list.sort((a,b)=>{
    let x=a[sortKey], y=b[sortKey];
    if(sortKey==="priceUsd"||sortKey==="deadlineDays"){x=+x;y=+y;}
    else if(sortKey==="status"){x=(STATUS_RANK[a.status]!==undefined?STATUS_RANK[a.status]:99);y=(STATUS_RANK[b.status]!==undefined?STATUS_RANK[b.status]:99);}
    else {x=(""+x);y=(""+y);}
    return (x<y?-1:x>y?1:0)*sortDir;
  });
  renderRows(list);
  markSort();
}

function renderRows(list){
  const tb = document.getElementById("rows");
  document.getElementById("empty").style.display = list.length?"none":"block";
  tb.innerHTML = list.map(a=>{
    const dead = (a.status==="geloescht"||a.status==="vergeben");
    return '<tr class="'+(dead?"dead":"")+'">'+
      '<td>'+a.date+'<br><span class="cat">'+(a.time||"")+'</span></td>'+
      '<td><span class="pill">'+a.platform+'</span></td>'+
      '<td class="job"><a href="'+a.url+'" target="_blank" rel="noopener">'+a.title+'</a><br><span class="cat">'+(a.category||"")+'</span></td>'+
      '<td class="price">'+a.priceUsd+' $</td>'+
      '<td>'+a.deadlineDays+' Tage</td>'+
      '<td><span class="badge b-'+a.status+'">'+(STATUS_LABEL[a.status]||a.status)+'</span></td>'+
    '</tr>';
  }).join("");
}

function markSort(){
  document.querySelectorAll("th[data-k]").forEach(th=>{
    const a=th.querySelector(".arr"); if(!a) return;
    if(th.dataset.k===sortKey){ th.classList.add("sorted"); a.textContent = sortDir>0?"▲":"▼"; }
    else { th.classList.remove("sorted"); a.textContent=""; }
  });
}

function init(){
  document.getElementById("fPlatform").innerHTML =
    '<option value="">Alle Plattformen</option>'+platforms().map(p=>'<option value="'+p+'">'+p+'</option>').join("");
  renderStats();
  document.getElementById("q").addEventListener("input", applyFilters);
  document.getElementById("fStatus").addEventListener("change", applyFilters);
  document.getElementById("fPlatform").addEventListener("change", applyFilters);
  document.querySelectorAll("th[data-k]").forEach(th=>th.addEventListener("click",function(){
    const k=th.dataset.k; if(sortKey===k) sortDir*=-1; else {sortKey=k; sortDir=1;}
    applyFilters();
  }));
  document.getElementById("foot").textContent =
    "Live aus bewerbungen.json · aktualisiert sich automatisch alle 2 Min · Bewerbungen täglich, Status mehrfach pro Tag geprüft";
  applyFilters();
}

async function loadData(){
  try{
    const r = await fetch('./bewerbungen.json?t='+Date.now(), {cache:'no-store'});
    if(!r.ok) return;
    const d = await r.json();
    if(d && d.applications){ DATA = d; apps = DATA.applications.slice(); refresh(); }
  }catch(e){ /* offline: eingebettete Reserve-Daten bleiben sichtbar */ }
}

function refresh(){
  const pf = document.getElementById("fPlatform"), cur = pf.value;
  pf.innerHTML = '<option value="">Alle Plattformen</option>'+platforms().map(p=>'<option value="'+p+'"'+(p===cur?' selected':'')+'>'+p+'</option>').join("");
  renderStats();
  applyFilters();
}

init();
loadData();
setInterval(loadData, 120000);
</script>
</body>
</html>
